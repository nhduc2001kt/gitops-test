apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: golist
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - srv: nginx
        image: 1.29.4
      - srv: nginx-2
        image: 1.29.4
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: golist-component
              operator: In
              values:
                - nginx
        - matchExpressions:
            - key: golist-component
              operator: In
              values:
                - nginx-2
  template:
    metadata:
      name: '{{srv}}'
      labels:
        golist-component: '{{srv}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/nhduc2001kt/gitops-test.git'
        targetRevision: main
        path: 'apps/nginx'
        helm:
          releaseName: '{{srv}}'
          valuesObject:          
            nginx:
              global:
                security:
                  allowInsecureImages: true`
              image:
                registry: public.ecr.aws
                tag: '{{image}}'
                debug: true
      destination:
        name: in-cluster
        namespace: golist
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m0s
            factor: 2
        syncOptions:
          - CreateNamespace=true
