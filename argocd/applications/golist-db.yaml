apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: database
  namespace: argocd
spec:
  source:
    chart: mariadb
    repoURL: 'https://charts.bitnami.com/bitnami'
    targetRevision: 11.1.0
    helm:
      releaseName: database
      valuesObject:
        architecture: "standalone"
        auth:
          database: "golist"
          username: "golist"
          password: "golist"
        image:
          registry: public.ecr.aws
          image: 10.6.8

  destination:
    namespace: golist
    server: 'https://kubernetes.default.svc'
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2
    syncOptions:
      - CreateNamespace=true
